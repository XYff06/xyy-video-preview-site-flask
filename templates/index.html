<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/static/styles.css"/>
    <title>xyy</title>
</head>
<body>
<!-- SPA挂载点，static/app.js会把首页、详情页和管理弹窗都渲染到这里 -->
<main class="app" id="app"></main>

<!-- 首页模板，负责标签筛选区和漫剧海报网格 -->
<template id="home-template">
    <section class="home-page">
        <header class="top-categories" id="category-list"></header>
        <section class="poster-grid" id="series-grid"></section>
    </section>
</template>

<!-- 详情模板，负责视频播放器、剧集切换和元信息区域 -->
<template id="detail-template">
    <section class="detail-page">
        <section class="player-wrap">
            <video id="player" controls preload="metadata"></video>
            <div class="episode-switcher">
                <button type="button" class="episode-nav" id="episode-previous" aria-label="上一页">◀</button>
                <div class="episode-row" id="episode-row"></div>
                <button type="button" class="episode-nav" id="episode-next" aria-label="下一页">▶</button>
            </div>
            <p id="player-meta"></p>
        </section>
    </section>
</template>

<!-- 前端脚本入口 -->
<script src="/static/app.js"></script>
</body>
</html>
