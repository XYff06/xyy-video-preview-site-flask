<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>xyy</title>
    <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
<!-- 应用挂载点：由 static/app.js 负责整页渲染与事件绑定 -->
<main class="app" id="app"></main>

<!-- 首页模板：标签筛选区 + 漫剧海报网格 -->
<template id="home-template">
    <section class="home-page">
        <header class="top-categories" id="category-list"></header>
        <section class="poster-grid" id="series-grid"></section>
    </section>
</template>

<!-- 详情页模板：视频播放器 + 剧集分页切换 + 元信息 -->
<template id="detail-template">
    <section class="detail-page">
        <section class="player-wrap">
            <video id="player" controls preload="metadata"></video>
            <div class="episode-switcher">
                <button type="button" class="episode-nav" id="episode-prev" aria-label="上一页">◀</button>
                <div class="episode-row" id="episode-row"></div>
                <button type="button" class="episode-nav" id="episode-next" aria-label="下一页">▶</button>
            </div>
            <p id="player-meta"></p>
        </section>
    </section>
</template>

<!-- 前端单页应用逻辑 -->
<script src="/static/app.js"></script>
</body>
</html>
